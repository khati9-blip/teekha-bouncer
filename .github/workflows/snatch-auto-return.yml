name: Snatch Auto Return

on:
  schedule:
    - cron: '28 18 * * 5'
  workflow_dispatch:

jobs:
  trigger-snatch-return:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger snatch return
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -s -X POST \
            "https://rmcxhorijitrhqyrvvkn.supabase.co/functions/v1/snatch-auto-return" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'
