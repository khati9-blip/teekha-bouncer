name: Snatch Auto Return

on:
  schedule:
    - cron: '28 18 * * 5'
  workflow_dispatch:

jobs:
  trigger-snatch-return:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger snatch return
        run: |
          python3 -c "
          import urllib.request, os
          url = 'https://rmcxhorijitrhqyrvvkn.supabase.co/functions/v1/snatch-auto-return'
          key = os.environ['SUPABASE_ANON_KEY']
          req = urllib.request.Request(url, method='POST', headers={'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json'})
          resp = urllib.request.urlopen(req)
          print('Status:', resp.status)
          "
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
