name: Snatch Auto Return

on:
  schedule:
    - cron: '28 18 * * 5'
  workflow_dispatch:

jobs:
  trigger-snatch-return:
    runs-on: ubuntu-latest
    steps:
      - name: Attempt 1
        env:
          KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: curl -s -X POST "https://rmcxhorijitrhqyrvvkn.supabase.co/functions/v1/snatch-auto-return" -H "Authorization: Bearer $KEY" -H "Content-Type: application/json"

      - name: Attempt 2
        env:
          KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: sleep 60 && curl -s -X POST "https://rmcxhorijitrhqyrvvkn.supabase.co/functions/v1/snatch-auto-return" -H "Authorization: Bearer $KEY" -H "Content-Type: application/json"

      - name: Attempt 3
        env:
          KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: sleep 60 && curl -s -X POST "https://rmcxhorijitrhqyrvvkn.supabase.co/functions/v1/snatch-auto-return" -H "Authorization: Bearer $KEY" -H "Content-Type: application/json"
